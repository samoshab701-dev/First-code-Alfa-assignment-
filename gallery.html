<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>

<h1>Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <img src="nature pic 1.jpg" class="image nature" onclick="openLightbox(this)">
  <img src="nature pic 2.jpg" class="image nature" onclick="openLightbox(this)">
  <img src="city pic1.jpg" class="image city" onclick="openLightbox(this)">
  <img src="city pic 2.jpg" class="image city" onclick="openLightbox(this)">
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <button class="prev" onclick="changeImage(-1)">❮</button>
  <img id="lightbox-img">
  <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script src="gallery.js"></script>
</body>
</html>
